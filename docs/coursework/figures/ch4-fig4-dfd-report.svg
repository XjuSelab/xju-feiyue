<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" width="1080" height="660">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- =========================================================
       网格规划（x,y,w,h）
       E1 注册用户（举报人）  20,278,125,76
       E2 AI 审核服务         515,40,175,60
       E3 管理员              945,270,115,78
       P2.1 提交举报          270,272,145,84
       P2.2 AI 审查分类       450,170,160,88
       P2.3 自动隐藏内容      530,378,160,84
       P2.4 举报队列展示      720,268,160,84
       P2.5 人工裁决处置      720,452,160,84
       D5 治理库（举报工单）  355,560,270,74  （右开口）
       D2 笔记库/D4 评论库    885,560,175,74  （右开口）
       ========================================================= -->


  <!-- ================= 连线（先画，形状白底盖住穿过的线） ================= -->
  <!-- F1 举报人 -> P2.1 : 举报单 -->
  <path d="M145,300 H270" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F2 P2.1 -> 举报人 : 受理回执 -->
  <path d="M270,332 H145" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F3 P2.1 -> D5 : 新工单（直下） -->
  <path d="M380,356 V560" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F4 P2.1 -> P2.2 : 触发审查（异步，虚线） -->
  <path d="M360,272 V214 H450" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-end="url(#arr)"/>
  <!-- F5 P2.2 -> AI 审核服务 : 目标内容 -->
  <path d="M560,170 V100" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F6 AI 审核服务 -> P2.2 : 标签/置信度/理由（平行错开） -->
  <path d="M595,100 V170" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F7 P2.2 -> D5 : 结论回写（直下，P2.3 偏右不挡） -->
  <path d="M480,258 V560" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F8 P2.2 -> P2.3 : 高置信违规 -->
  <path d="M560,258 V378" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F9 P2.3 -> D2/D4 : 置为隐藏态（右出穿 P2.4/P2.5 之间下折） -->
  <path d="M690,430 H920 V560" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F10 D5 -> P2.4 : 工单+内容快照+AI结论（上折右入） -->
  <path d="M520,560 V314 H720" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F11 P2.4 -> 管理员 : 队列展示 -->
  <path d="M880,310 H945" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F12 管理员 -> P2.5 : 裁决指令（下折左入） -->
  <path d="M1000,348 V490 H880" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F13 P2.2 -> P2.4 : AI 不可用·直送人工（虚线降级） -->
  <path d="M610,210 H800 V268" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-end="url(#arr)"/>
  <!-- F14 P2.5 -> D5 : 处置记录（下折左入右开口） -->
  <path d="M750,536 V590 H625" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- F15 P2.5 -> D2/D4 : 删除或恢复（下折右入左边） -->
  <path d="M840,536 V590 H885" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- ================= 外部实体（矩形） ================= -->
  <rect x="20" y="278" width="125" height="76" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="82" y="310" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">注册用户</text>
  <text x="82" y="331" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">（举报人）</text>

  <rect x="515" y="40" width="175" height="60" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="602" y="76" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">AI 审核服务</text>

  <rect x="945" y="270" width="115" height="78" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="1002" y="316" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">管理员</text>

  <!-- ================= 加工（圆角矩形，编号在名称上一行） ================= -->
  <rect x="270" y="272" width="145" height="84" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="342" y="306" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">P2.1</text>
  <text x="342" y="328" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">提交举报</text>

  <rect x="450" y="170" width="160" height="88" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="530" y="206" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">P2.2</text>
  <text x="530" y="228" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">AI 审查分类</text>

  <rect x="530" y="378" width="160" height="84" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="610" y="414" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">P2.3</text>
  <text x="610" y="436" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">自动隐藏内容</text>

  <rect x="720" y="268" width="160" height="84" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="800" y="304" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">P2.4</text>
  <text x="800" y="326" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">举报队列展示</text>

  <rect x="720" y="452" width="160" height="84" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="800" y="488" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">P2.5</text>
  <text x="800" y="510" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">人工裁决处置</text>

  <!-- ================= 数据存储（右侧开口矩形：上、左、下三边） ================= -->
  <path d="M625,560 L355,560 L355,634 L625,634" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="490" y="601" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">D5 治理库（举报工单）</text>

  <path d="M1060,560 L885,560 L885,634 L1060,634" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="972" y="588" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">D2 笔记库</text>
  <text x="972" y="610" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">D4 评论库</text>

  <!-- ================= 数据流标注（白底描边，避免压线） ================= -->
  <text x="207" y="291" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">举报单（类型+说明）</text>
  <text x="207" y="324" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">受理回执</text>
  <text x="388" y="455" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">新工单</text>
  <text x="400" y="206" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">触发审查（异步）</text>
  <text x="552" y="140" text-anchor="end" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">目标内容</text>
  <text x="600" y="140" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">标签/置信度/理由</text>
  <text x="487" y="330" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">结论回写</text>
  <text x="573" y="350" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">高置信违规</text>
  <text x="790" y="422" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">置为隐藏态</text>
  <text x="640" y="306" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">工单+内容快照+AI结论</text>
  <text x="912" y="302" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">队列展示</text>
  <text x="1006" y="420" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">裁决指令</text>
  <text x="705" y="203" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">AI 不可用·直送人工</text>
  <text x="758" y="556" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">处置记录</text>
  <text x="843" y="553" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">删除或恢复</text>
</svg>
