<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 900" width="1180" height="900">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ===== System boundary (x180..1000, y48..860) ===== -->
  <rect x="180" y="48" width="820" height="812" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- ===== Dashed group boxes ===== -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6 4">
    <rect x="196" y="214" width="196" height="286" rx="12"/><!-- 写作域 -->
    <rect x="402" y="104" width="384" height="496" rx="12"/><!-- 浏览互动域 -->
    <rect x="812" y="104" width="184" height="496" rx="12"/><!-- 治理域 -->
    <rect x="196" y="560" width="196" height="96" rx="12"/><!-- 成长域 -->
  </g>

  <!-- ===== Association lines (thin solid, no arrow) drawn BEFORE ellipses so white fill covers crossings ===== -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1">
    <!-- 匿名访客 (126,152) -->
    <line x1="126" y1="152" x2="404" y2="160"/>
    <line x1="126" y1="152" x2="598" y2="160"/>
    <!-- 注册用户 (126,492) -->
    <line x1="126" y1="492" x2="202" y2="280"/>
    <line x1="126" y1="492" x2="202" y2="375"/>
    <line x1="126" y1="492" x2="202" y2="470"/>
    <line x1="126" y1="492" x2="202" y2="613"/>
    <line x1="126" y1="492" x2="404" y2="160"/>
    <line x1="126" y1="492" x2="404" y2="290"/>
    <line x1="126" y1="492" x2="404" y2="420"/>
    <line x1="126" y1="492" x2="404" y2="550"/>
    <line x1="126" y1="492" x2="598" y2="160"/>
    <line x1="126" y1="492" x2="598" y2="290"/>
    <line x1="126" y1="492" x2="598" y2="420"/>
    <line x1="126" y1="492" x2="598" y2="550"/>
    <line x1="126" y1="492" x2="812" y2="160"/>
    <line x1="126" y1="492" x2="812" y2="290"/>
    <!-- 管理员 (1070,204) -->
    <line x1="1070" y1="204" x2="996" y2="420"/>
    <!-- AI 审核服务 (1070,679) -->
    <line x1="1070" y1="679" x2="996" y2="550"/>
  </g>

  <!-- ===== Use case ellipses (white fill covers passing lines) ===== -->
  <g fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5">
    <ellipse cx="294" cy="280" rx="92" ry="26"/>
    <ellipse cx="294" cy="375" rx="92" ry="26"/>
    <ellipse cx="294" cy="470" rx="92" ry="26"/>
    <ellipse cx="496" cy="160" rx="92" ry="26"/>
    <ellipse cx="690" cy="160" rx="92" ry="26"/>
    <ellipse cx="496" cy="290" rx="92" ry="26"/>
    <ellipse cx="690" cy="290" rx="92" ry="26"/>
    <ellipse cx="496" cy="420" rx="92" ry="26"/>
    <ellipse cx="690" cy="420" rx="92" ry="26"/>
    <ellipse cx="496" cy="550" rx="92" ry="26"/>
    <ellipse cx="690" cy="550" rx="92" ry="26"/>
    <ellipse cx="904" cy="160" rx="92" ry="26"/>
    <ellipse cx="904" cy="290" rx="92" ry="26"/>
    <ellipse cx="904" cy="420" rx="92" ry="26"/>
    <ellipse cx="904" cy="550" rx="92" ry="26"/>
    <ellipse cx="294" cy="613" rx="92" ry="26"/>
  </g>

  <!-- ===== Use case labels (13px, two lines) ===== -->
  <g font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="13" fill="#1a1a1a" text-anchor="middle">
    <text x="294" y="276">UC-01 撰写草稿<tspan x="294" dy="18">(自动保存)</tspan></text>
    <text x="294" y="371">UC-02<tspan x="294" dy="18">AI 选段润色</tspan></text>
    <text x="294" y="466">UC-03 发布笔记<tspan x="294" dy="18">(AI摘要兜底)</tspan></text>
    <text x="496" y="156">UC-04<tspan x="496" dy="18">浏览/检索信息流</tspan></text>
    <text x="690" y="156">UC-05<tspan x="690" dy="18">查看笔记详情</tspan></text>
    <text x="496" y="286">UC-06<tspan x="496" dy="18">笔记赞/踩</tspan></text>
    <text x="690" y="286">UC-07<tspan x="690" dy="18">收藏笔记</tspan></text>
    <text x="496" y="416">UC-08<tspan x="496" dy="18">我的收藏</tspan></text>
    <text x="690" y="416">UC-09<tspan x="690" dy="18">锚点评论</tspan></text>
    <text x="496" y="546">UC-10<tspan x="496" dy="18">楼中楼回复(带图)</tspan></text>
    <text x="690" y="546">UC-11<tspan x="690" dy="18">评论赞/踩</tspan></text>
    <text x="904" y="156">UC-12<tspan x="904" dy="18">举报内容</tspan></text>
    <text x="904" y="286">UC-13<tspan x="904" dy="18">拉黑用户</tspan></text>
    <text x="904" y="416">UC-14<tspan x="904" dy="18">处理举报(裁决)</tspan></text>
    <text x="904" y="546">UC-15<tspan x="904" dy="18">AI 审查分类</tspan></text>
    <text x="294" y="609">UC-16<tspan x="294" dy="18">每日签到与等级</tspan></text>
  </g>

  <!-- ===== Include dependencies (dashed arrow) drawn AFTER ellipses so arrowheads stay visible ===== -->
  <g fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4">
    <!-- UC-03 -> UC-15, threads the row3/row4 corridor -->
    <path d="M386,470 L430,486 L800,486 L812,552" marker-end="url(#arr)"/>
    <!-- UC-12 -> UC-15, routed down the browse/governance corridor (x=799) -->
    <path d="M812,160 L799,160 L799,540 L816,540" marker-end="url(#arr)"/>
  </g>

  <!-- ===== «include» labels (12px, white halo) ===== -->
  <g font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
    <text x="615" y="482">«include»</text>
    <text x="799" y="352">«include»</text>
  </g>

  <!-- ===== Group labels (12px, top-left of each box, white halo) ===== -->
  <g font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" stroke-linejoin="round">
    <text x="208" y="234">写作域</text>
    <text x="414" y="124">浏览互动域</text>
    <text x="822" y="124">治理域</text>
    <text x="208" y="580">成长域</text>
  </g>

  <!-- ===== Actors (stick figures) ===== -->
  <g stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round">
    <!-- 匿名访客 (left, y~150) -->
    <circle cx="110" cy="132" r="9" fill="#ffffff"/>
    <line x1="110" y1="141" x2="110" y2="171"/>
    <line x1="94" y1="151" x2="126" y2="151"/>
    <line x1="110" y1="171" x2="96" y2="193"/>
    <line x1="110" y1="171" x2="124" y2="193"/>
    <!-- 注册用户 (left, y~490) -->
    <circle cx="110" cy="470" r="9" fill="#ffffff"/>
    <line x1="110" y1="479" x2="110" y2="509"/>
    <line x1="94" y1="489" x2="126" y2="489"/>
    <line x1="110" y1="509" x2="96" y2="531"/>
    <line x1="110" y1="509" x2="124" y2="531"/>
    <!-- 管理员 (right, y~205) -->
    <circle cx="1086" cy="185" r="9" fill="#ffffff"/>
    <line x1="1086" y1="194" x2="1086" y2="224"/>
    <line x1="1070" y1="204" x2="1102" y2="204"/>
    <line x1="1086" y1="224" x2="1072" y2="246"/>
    <line x1="1086" y1="224" x2="1100" y2="246"/>
    <!-- AI 审核服务 (right, y~680) -->
    <circle cx="1086" cy="660" r="9" fill="#ffffff"/>
    <line x1="1086" y1="669" x2="1086" y2="699"/>
    <line x1="1070" y1="679" x2="1102" y2="679"/>
    <line x1="1086" y1="699" x2="1072" y2="721"/>
    <line x1="1086" y1="699" x2="1100" y2="721"/>
  </g>

  <!-- ===== Actor names ===== -->
  <g font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a" text-anchor="middle">
    <text x="110" y="213">匿名访客</text>
    <text x="110" y="553">注册用户</text>
    <text x="1086" y="268">管理员</text>
    <text x="1086" y="745">AI 审核服务</text>
    <text x="1086" y="763" font-size="12">«外部系统»</text>
  </g>

  <!-- ===== Title ===== -->
  <text x="590" y="76" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">笔记系统与社区互动模块</text>
</svg>
