<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" width="920" height="640">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- ================= 连线（先画，形状白底盖住） ================= -->
  <!-- 用户浏览器 -> nginx : x=250, 95->160 -->
  <path d="M250,95 V160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- 管理员浏览器 -> nginx : x=650, 95->160 -->
  <path d="M650,95 V160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- nginx -> FastAPI : x=270, 225->290 -->
  <path d="M270,225 V290" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- FastAPI -> SQLite : x=270, 390->430 -->
  <path d="M270,390 V430" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- FastAPI <-> AI 实线双向 : y=345, 450->610 -->
  <path d="M450,345 H610" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <!-- FastAPI <-> AI 虚线双向 : y=382, 450->610 -->
  <path d="M450,382 H610" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4" fill="none" marker-start="url(#arr)" marker-end="url(#arr)"/>

  <!-- ================= 顶层：外部终端 ================= -->
  <!-- 用户浏览器 : x110 y30 w280 h65 -->
  <rect x="110" y="30" width="280" height="65" rx="0" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="250" y="56" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">用户浏览器</text>
  <text x="250" y="76" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">React 18 单页应用</text>

  <!-- 管理员浏览器 : x510 y30 w280 h65 -->
  <rect x="510" y="30" width="280" height="65" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="650" y="56" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">管理员浏览器</text>
  <text x="650" y="76" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">举报队列页面</text>

  <!-- ================= 第二层：nginx ================= -->
  <!-- nginx : x90 y160 w700 h65 -->
  <rect x="90" y="160" width="700" height="65" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">nginx</text>
  <text x="440" y="206" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">静态资源直出 + API 反向代理</text>

  <!-- ================= 第三层：FastAPI ================= -->
  <!-- FastAPI : x90 y290 w360 h100 -->
  <rect x="90" y="290" width="360" height="100" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="270" y="333" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">FastAPI 后端</text>
  <text x="270" y="353" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">路由层 → 服务层 → 数据层</text>

  <!-- ================= 右侧：AI 服务 ================= -->
  <!-- AI 服务 : x610 y310 w290 h100 -->
  <rect x="610" y="310" width="290" height="100" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="755" y="353" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">AI 服务（OpenAI 兼容）</text>
  <text x="755" y="373" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">DeepSeek 占位 → Gemma4 12B 微调</text>

  <!-- ================= 底层左侧：SQLite 圆柱体 ================= -->
  <!-- 圆柱: 中心 x270, 顶椭圆 cy452 rx130 ry20, 体到 y562 -->
  <rect x="140" y="452" width="260" height="110" fill="#ffffff" stroke="none"/>
  <line x1="140" y1="452" x2="140" y2="562" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="400" y1="452" x2="400" y2="562" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M140,562 A130,20 0 0 0 400,562" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="270" cy="452" rx="130" ry="20" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="270" y="503" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">SQLite 主库</text>
  <text x="270" y="523" text-anchor="middle" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="14" fill="#1a1a1a">笔记/评论/互动/治理/成长</text>

  <!-- ================= 数据流标注（白底描边，避免压线） ================= -->
  <text x="258" y="131" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">HTTPS</text>
  <text x="658" y="131" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">HTTPS</text>
  <text x="278" y="261" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">反代 127.0.0.1</text>
  <text x="278" y="414" text-anchor="start" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">读写</text>
  <text x="530" y="336" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">润色/摘要（同步）</text>
  <text x="530" y="374" text-anchor="middle" paint-order="stroke" stroke="#ffffff" stroke-width="4" font-family="'Noto Sans CJK SC','Microsoft YaHei','SimSun',sans-serif" font-size="12" fill="#1a1a1a">审查分类（异步）</text>
</svg>
