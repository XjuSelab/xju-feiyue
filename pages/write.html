# 从一次失败的 Kaggle 复盘说起

> 如果你的 OOF 不动而 LB 在涨，几乎可以肯定你在过拟合榜单。

上周 *CIBMTR · Equity in Post-HCT Survival* 比赛结束。我从 public LB 第 27 名，一路 shake 到 private 第 312 名 —— 这是一个非常昂贵的教训。

## 一、问题出在哪里

事后看，我犯了一个最朴素的错误：**把 public LB 当成了 validation set**。

我每天提交 5 次，盯着 LB 调超参，但 OOF 分数其实从第三天起就没有再涨过。这意味着我后面所有的「优化」都是噪声。

### 量化一下

我们在 metric \`C-index\` 上的关系大致可以写成：

$$
C_\\text{LB} = C_\\text{true} + \\epsilon, \\quad \\epsilon \\sim \\mathcal{N}(0, \\sigma^2)
$$

其中 $\\sigma$ 在 public set 上随提交次数增加而被你"挤出来"。

## 二、新的工作流程

从这场比赛开始，我把工作流改成了下面这样：

1. 开赛 24h 内确定 CV 切分方式
2. 每个实验跑前先写一行 \`hypothesis:\`
3. 每天最多 2 次提交
4. 最后三天禁止改 CV 切分

清单上还包括：

- 分组列是什么？
- 分层列是什么？
- 是否有第二个独立指标？

### 关键代码片段

from sklearn.model_selection import StratifiedGroupKFold
import numpy as np

def make_folds(df, n_splits=5, seed=42):
    """Stratify on event, group by patient_id."""
    sgkf = StratifiedGroupKFold(
        n_splits=n_splits, shuffle=True, random_state=seed
    )
    df = df.copy()
    df["fold"] = -1
    for i, (_, val_idx) in enumerate(
        sgkf.split(df, df.event, df.patient_id)
    ):
        df.loc[val_idx, "fold"] = i
    return df

function mathPlugin(md) {
  md.inline.ruler.after('escape', 'math_inline', function(state, silent) {
    const start = state.pos;
    if (state.src[start] !== '$') return false;
    // skip if escaped
    if (start > 0 && state.src[start-1] === '\\') return false;
    // skip $$
    if (state.src[start+1] === '$') return false;
    const end = state.src.indexOf('$', start + 1);
    if (end < 0) return false;
    const content = state.src.slice(start + 1, end);
    if (!content.length) return false;
    // disallow whitespace right after $ or right before $
    if (/^[\s]/.test(content) || /[\s]$/.test(content)) return false;
    if (!silent) {
      const token = state.push('math_inline', 'span', 0);
      token.content = content;
      token.markup = '$';
    }
    state.pos = end + 1;
    return true;
  });

  md.block.ruler.after('blockquote', 'math_block', function(state, startLine, endLine, silent) {
    const start = state.bMarks[startLine] + state.tShift[startLine];
    const max = state.eMarks[startLine];
    if (state.src.slice(start, start + 2) !== '$$') return false;
    let nextLine = startLine;
    let content = '';
    let found = false;
    const firstLine = state.src.slice(start + 2, max);
    if (firstLine.trim().endsWith('$$') && firstLine.trim().length >= 2) {
      content = firstLine.slice(0, firstLine.lastIndexOf('$$'));
      found = true;
    } else {
      content = firstLine + '\n';
      nextLine = startLine + 1;
      while (nextLine < endLine) {
        const ls = state.bMarks[nextLine];
        const le = state.eMarks[nextLine];
        const line = state.src.slice(ls, le);
        if (line.trim() === '$$') { found = true; break; }
        content += line + '\n';
        nextLine++;
      }
    }
    if (!found) return false;
    if (silent) return true;
    const token = state.push('math_block', 'div', 0);
    token.block = true;
    token.content = content.trim();
    state.line = nextLine + 1;
    return true;
  });

  md.renderer.rules.math_inline = (tokens, idx) => {
    try { return katex.renderToString(tokens[idx].content, { throwOnError: false }); }
    catch (e) { return md.utils.escapeHtml(tokens[idx].content); }
  };
  md.renderer.rules.math_block = (tokens, idx) => {
    try { return '<div class="math-display">' + katex.renderToString(tokens[idx].content, { displayMode: true, throwOnError: false }) + '</div>'; }
    catch (e) { return '<pre>' + md.utils.escapeHtml(tokens[idx].content) + '</pre>'; }
  };
}

              <div key={k} className="cat-opt" onClick={() => { onChange(k); setOpen(false); }}>
                <span className="cat-dot" style={{ background: c.color, marginTop: 6 }}></span>
                <span className="cat-opt-text">
                  <span className="cat-opt-name" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                    <CatIcon cat={k} size={14} />
                    {c.label}
                  </span>
                  <span className="cat-opt-desc">{c.desc}</span>
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ===================== sub bar ===================== */
const MD_BTNS = [
  { k: 'h1',     glyph: 'H1', tip: '一级标题',     wrap: ['# ', ''], block: true },
  { k: 'h2',     glyph: 'H2', tip: '二级标题',     wrap: ['## ', ''], block: true },
  { sep: true },
  { k: 'b',      glyph: <b>B</b>, tip: '加粗',     wrap: ['**', '**'] },
  { k: 'i',      glyph: <i>I</i>, tip: '斜体',     wrap: ['*', '*'] },
  { k: 'link',   glyph: '🔗', tip: '链接',         wrap: ['[', '](https://)'] },
  { k: 'img',    glyph: '🖼', tip: '图片',         wrap: ['![', '](placeholder)'] },
  { sep: true },
  { k: 'code',   glyph: '</>', tip: '代码块',      wrap: ['\n```python\n', '\n```\n'], block: true },
  { k: 'quote',  glyph: '❝',  tip: '引用',         wrap: ['> ', ''], block: true },
  { k: 'ul',     glyph: '•',  tip: '无序列表',     wrap: ['- ', ''], block: true },
  { k: 'table',  glyph: '⊞',  tip: '表格',
    insert: '\n| 列 1 | 列 2 | 列 3 |\n| --- | --- | --- |\n| a | b | c |\n' },
  { k: 'hr',     glyph: '—',  tip: '分割线',       insert: '\n\n---\n\n' },
];

function SubBar({ tags, setTags, mode, setMode, words, mins, onMd, aiOpen, onToggleAi }) {
  const [draft, setDraft] = useState('');
  const onKey = (e) => {
    if (e.key === 'Enter' && draft.trim()) {
      e.preventDefault();
      const v = draft.trim().replace(/^#/, '');
      if (v && !tags.includes(v)) setTags([...tags, v]);
      setDraft('');
    } else if (e.key === 'Backspace' && !draft && tags.length) {
      setTags(tags.slice(0, -1));
    }
  };
  return (
    <div className="subbar">
      <div className="md-btns">
        {MD_BTNS.map((b, i) => b.sep
          ? <span key={i} className="md-sep" />
          : <span key={b.k} className="md-btn" onClick={() => onMd(b)}>{b.glyph}<span className="tip">{b.tip}</span></span>
        )}
      </div>

      <div className="tag-input-wrap">
        {tags.map(t => (
          <span key={t} className="tag-pill"># {t}<span className="x" onClick={() => setTags(tags.filter(x => x !== t))}>×</span></span>
        ))}
        <input
          className="tag-input"
          placeholder={tags.length ? '继续添加…' : '添加标签… (Enter 确认)'}
          value={draft}
          onChange={e => setDraft(e.target.value)}
          onKeyDown={onKey}
        />
      </div>

      <div className="sub-right">
        <span>{words.toLocaleString()} 字 · 预计 {mins} 分钟阅读</span>
        <button className={`ai-btn-sub ${aiOpen ? 'is-on' : ''}`} onClick={onToggleAi} title="AI 助手">
          <Icon name="sparkles" size={14} stroke={1.8} color="#fff" />
          AI 助手
        </button>
        <div className="mode-group">
          <button className={`mode-btn ${mode==='write'?'active':''}`}   onClick={() => setMode('write')} title="纯写作">📝 写作</button>
          <button className={`mode-btn ${mode==='split'?'active':''}`}   onClick={() => setMode('split')} title="双栏">✏️ 双栏</button>
          <button className={`mode-btn ${mode==='preview'?'active':''}`} onClick={() => setMode('preview')} title="预览">👁 预览</button>
        </div>
      </div>
    </div>
  );
}

/* ===================== editor + preview panes ===================== */
function getCaretCoords(textarea, position) {
  const div = document.createElement('div');
  const styles = getComputedStyle(textarea);
  const props = ['boxSizing','width','overflowX','overflowY','borderTopWidth','borderRightWidth','borderBottomWidth','borderLeftWidth','paddingTop','paddingRight','paddingBottom','paddingLeft','fontStyle','fontVariant','fontWeight','fontStretch','fontSize','fontSizeAdjust','lineHeight','fontFamily','textAlign','textTransform','textIndent','letterSpacing','wordSpacing','tabSize','whiteSpace','wordBreak','wordWrap'];
  props.forEach(p => { try { div.style[p] = styles[p]; } catch(e){} });
  div.style.position = 'absolute';
  div.style.visibility = 'hidden';
  div.style.whiteSpace = 'pre-wrap';
  div.style.wordBreak = 'break-word';
  div.style.overflow = 'hidden';
  div.style.left = '-9999px';
  div.style.top = '0';
  div.textContent = textarea.value.substring(0, position);
  const span = document.createElement('span');
  span.textContent = textarea.value.substring(position) || '.';
  div.appendChild(span);
  document.body.appendChild(div);
  const rect = textarea.getBoundingClientRect();
  const lh = parseFloat(styles.lineHeight) || 22;
  const x = rect.left + span.offsetLeft - textarea.scrollLeft;
  const y = rect.top  + span.offsetTop  - textarea.scrollTop;
  document.body.removeChild(div);
  return { x, y, height: lh };
}

function Panes({ src, setSrc, mode, editorRef, previewRef, onTextareaSelect }) {
  const html = useMemo(() => md.render(src), [src]);

  // wire copy buttons after render
  useEffect(() => {
    if (!previewRef.current) return;
    const btns = previewRef.current.querySelectorAll('button[data-copy]');
    const handlers = [];
    btns.forEach(btn => {
      const onClick = () => {
        const pre = btn.closest('pre');
        const code = pre?.querySelector('code');
        const text = code ? code.innerText : '';
        navigator.clipboard?.writeText(text).then(() => {
          const orig = btn.innerHTML;
          btn.classList.add('copied');
          btn.innerHTML = 'Copied ✓';
          setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
        });
      };
      btn.addEventListener('click', onClick);
      handlers.push([btn, onClick]);
    });
    return () => handlers.forEach(([btn, h]) => btn.removeEventListener('click', h));
  }, [html]);

  // scroll sync (left → right)
  const syncing = useRef(false);
  const scrollDeb = useRef(null);
  const onEditorScroll = () => {
    if (mode !== 'split') return;
    if (syncing.current) return;
    if (scrollDeb.current) clearTimeout(scrollDeb.current);
    scrollDeb.current = setTimeout(() => {
      const e = editorRef.current?.parentElement?.parentElement; // pane
      const p = previewRef.current?.parentElement?.parentElement;
      if (!e || !p) return;
      const ratio = e.scrollTop / Math.max(1, (e.scrollHeight - e.clientHeight));
      syncing.current = true;
      p.scrollTop = ratio * (p.scrollHeight - p.clientHeight);
      requestAnimationFrame(() => { syncing.current = false; });
    }, 50);
  };

  return (
    <div className={`split mode-${mode}`}>
      <div className="pane editor-pane" onScroll={onEditorScroll}>
        <div className="editor-inner">
          <textarea
            ref={editorRef}
            className="editor"
            value={src}
            onChange={e => setSrc(e.target.value)}
            onSelect={e => onTextareaSelect && onTextareaSelect(e.target.selectionStart, e.target.selectionEnd, e.target.value)}
            onMouseUp={e => onTextareaSelect && onTextareaSelect(e.target.selectionStart, e.target.selectionEnd, e.target.value)}
            onKeyUp={e => onTextareaSelect && onTextareaSelect(e.target.selectionStart, e.target.selectionEnd, e.target.value)}
            placeholder="# 用一个清晰的标题开始你的笔记…"
            spellCheck={false}
          />
        </div>
      </div>
      <div className="pane preview-pane">
        <div className="preview-inner">
          <article ref={previewRef} className="prose-claude" dangerouslySetInnerHTML={{ __html: html }} />
        </div>
      </div>
    </div>
  );
}

/* ===================== publish modal ===================== */
function PublishModal({ open, onClose, title, cat, setCat, tags, summary, setSummary, onConfirm }) {
  if (!open) return null;
  return (
    <div className="modal-bg" onClick={onClose}>

        <h2>准备发布这篇笔记</h2>
        <p className="modal-sub">{title || '无标题笔记'}</p>

        <div className="modal-row">
          <label>封面图</label>
          <div className="cover-pick">
            <div className="cover-thumb">[ 1st image ]</div>
            <button className="btn btn-sm">上传替换</button>
            <span style={{ fontFamily: 'var(--font-ui)', fontSize: 12, color: 'var(--fg-faint)' }}>默认使用正文第一张图</span>
          </div>

        <div className="modal-row">

          </div>
          <textarea
            className="textarea"
            rows={3}

            value={summary}
            onChange={e => setSummary(e.target.value)}
            placeholder="用一句话概括这篇笔记…（自动从首段截取）"
          />
        </div>

        <div className="modal-row">
          <label>类别 &amp; 标签</label>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
            <CategorySelect value={cat} onChange={setCat} />
            {tags.length === 0
              ? <span style={{ fontFamily: 'var(--font-ui)', fontSize: 12, color: 'var(--fg-faint)' }}>未添加标签</span>
              : tags.map(t => <span key={t} className="tag-pill" style={{ borderColor: 'var(--line)' }}># {t}</span>)
            }
          </div>
        </div>

        <div className="modal-actions">
          <button className="btn btn-sm" onClick={onClose}>取消</button>
          <button className="btn btn-sm btn-primary" onClick={onConfirm}>确认发布</button>
        </div>
      </div>
    </div>
  );
}

/* ===================== app ===================== */
function App() {
  const [title, setTitle] = useState('从一次失败的 Kaggle 复盘说起');
  const [cat, setCat]     = useState('kaggle');
  const [tags, setTags]   = useState(['Kaggle', 'CV', '复盘']);
  const [src, setSrc]     = useState(SAMPLE);
  const [mode, setMode]   = useState('split');
  const [savedAt, setSavedAt] = useState(new Date());
  const [showPublish, setShowPublish] = useState(false);
  const [summary, setSummary]   = useState('');
  const [toast, setToast]       = useState('');

  const editorRef = useRef(null);
  const previewRef = useRef(null);

  /* AI drawer state */
  const [aiOpen, setAiOpen]         = useState(false);
  const [drawerWidth, setDrawerWidth] = useState(380);
  const [selection, setSelection]   = useState({ start: 0, end: 0, text: '' });
  const [floatRect, setFloatRect]   = useState(null);
  const [initialOp, setInitialOp]   = useState(null);
  const [aiHistory, setAiHistory]   = useState([]);
  const didPreload                  = useRef(false);

  const onTextareaSelect = (start, end, value) => {
    const text = value.slice(start, end);
    setSelection({ start, end, text });
    if (text.length >= 4 && !aiOpen) {
      const ta = editorRef.current;
      if (ta) {
        const startCoords = getCaretCoords(ta, start);
        const endCoords   = getCaretCoords(ta, end);
        const top    = Math.min(startCoords.y, endCoords.y);
        const left   = (startCoords.x + endCoords.x) / 2;
        const bottom = Math.max(startCoords.y, endCoords.y) + endCoords.height;
        setFloatRect({ top, left: left - 100, width: 200, bottom });
      }
    } else if (text.length < 4) {
      setFloatRect(null);
    }
  };

  const closeFloat = () => setFloatRect(null);

  const startOp = (action) => {
    closeFloat();
    setAiOpen(true);
    setInitialOp({ action });
  };

  const applyAiResult = (newText, replacedText) => {
    setSrc(prev => {
      // if a selection range was used at start of op, replace by index range to be safe
      if (selection.text && selection.text.trim() && replacedText === selection.text) {
        return prev.slice(0, selection.start) + newText + prev.slice(selection.end);
      }
      // otherwise replace whole doc
      return newText;
    });
    // collapse selection to end of insert so next op works on full doc by default
    setTimeout(() => {
      const ta = editorRef.current;
      if (ta) {
        const newPos = (selection.text && selection.text.trim()) ? selection.start + newText.length : newText.length;
        ta.setSelectionRange(newPos, newPos);
        ta.focus();
      }
      setSelection({ start: 0, end: 0, text: '' });
    }, 0);
  };

  const onAiUndo = (entry) => {
    if (entry.undoSnapshot != null) setSrc(entry.undoSnapshot);
    setAiHistory(h => h.filter(e => e !== entry));
    showToast('已撤销');
  };

  /* one-time pre-load demo: select the lab note paragraph and auto-run 润色 */
  useEffect(() => {
    if (didPreload.current) return;
    didPreload.current = true;
    const idx = SAMPLE.indexOf(LAB_NOTE_PARA);
    if (idx === -1) return;
    const start = idx;
    const end   = idx + LAB_NOTE_PARA.length;
    setSelection({ start, end, text: LAB_NOTE_PARA });
    setAiOpen(true);
    setInitialOp({ action: 'polish' });
    setTimeout(() => {
      const ta = editorRef.current;
      if (ta) { ta.setSelectionRange(start, end); }
    }, 50);
  }, []);

  const showToast = (m) => { setToast(m); setTimeout(() => setToast(''), 1800); };

  /* word/min count (Chinese-aware) */
  const { words, mins } = useMemo(() => {
    const stripped = src
      .replace(/```[\s\S]*?```/g, '')
      .replace(/`[^`]*`/g, '')
      .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
      .replace(/\[([^\]]*)\]\([^)]*\)/g, '$1')
      .replace(/[#>*_\-\|`]/g, '');
    const cn = (stripped.match(/[\u4e00-\u9fff]/g) || []).length;
    const en = (stripped.match(/[A-Za-z]+(?:'[A-Za-z]+)?/g) || []).length;
    const total = cn + en;
    return { words: total, mins: Math.max(1, Math.round(total / 350)) };
  }, [src]);

  /* autosave every 5s */
  useEffect(() => {
    const t = setTimeout(() => setSavedAt(new Date()), 5000);
    return () => clearTimeout(t);
  }, [src, title, tags, cat]);

  /* toolbar md insert */
  const onMd = (b) => {
    const ta = editorRef.current;
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    const before = src.slice(0, start), sel = src.slice(start, end), after = src.slice(end);
    let next, caret;
    if (b.insert) {
      next = before + b.insert + after;
      caret = start + b.insert.length;
    } else {
      const [pre, post] = b.wrap;
      // ensure block elements start on a fresh line
      const fixedPre = b.block && before && !before.endsWith('\n') ? '\n' + pre : pre;
      next = before + fixedPre + sel + post + after;
      caret = end + fixedPre.length + post.length;
    }
    setSrc(next);
    setTimeout(() => { ta.focus(); ta.setSelectionRange(caret, caret); }, 0);
  };

  /* shortcuts */
  useEffect(() => {
    const onKey = (e) => {
      const meta = e.metaKey || e.ctrlKey;
      if (!meta) return;
      if (e.key === 's') { e.preventDefault(); setSavedAt(new Date()); showToast('已保存草稿'); }
      else if (e.key === 'Enter') { e.preventDefault(); openPublish(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [src, title]);

  /* image drop */
  const onDrop = (e) => {
    e.preventDefault();
    const f = e.dataTransfer.files?.[0];
    if (!f || !/^image\//.test(f.type)) return;
    // mock: insert placeholder reference
    const md = `\n\n![${f.name}](placeholder)\n\n`;
    setSrc(s => s + md);
    showToast('已插入图片占位符');
  };
  const onDragOver = (e) => e.preventDefault();

  /* publish */
  const openPublish = () => {
    if (!summary) {
      const firstPara = src.split('\n').map(s => s.trim())
        .find(s => s && !s.startsWith('#') && !s.startsWith('>') && !s.startsWith('!') && !s.startsWith('|') && !s.startsWith('-') && !s.startsWith('*') && !s.startsWith('`'));
      setSummary((firstPara || '').slice(0, 150));
    }
    setShowPublish(true);
  };

  const fmtTime = (d) => d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const modeLabel = { write: '纯写作', split: '双栏模式', preview: '预览模式' }[mode];

  return (
    <>
      <TopBar
        title={title} setTitle={setTitle}
        cat={cat} setCat={setCat}
        onSaveDraft={() => { setSavedAt(new Date()); showToast('已保存草稿'); }}
        onPublish={openPublish}
      />
      <SubBar
        tags={tags} setTags={setTags}
        mode={mode} setMode={setMode}
        words={words} mins={mins}
        onMd={onMd}
        aiOpen={aiOpen}
        onToggleAi={() => { setAiOpen(o => !o); closeFloat(); }}
      />

      <div style={{ flex: '1 1 auto', display: 'flex', minHeight: 0 }}>
        <div onDrop={onDrop} onDragOver={onDragOver}
             style={{ flex: '1 1 auto', display: 'flex', flexDirection: 'column', minHeight: 0, minWidth: 0 }}>
          <Panes src={src} setSrc={setSrc} mode={mode}
                 editorRef={editorRef} previewRef={previewRef}
                 onTextareaSelect={onTextareaSelect} />
        </div>
        {aiOpen && (
          <AIDrawer
            open={aiOpen}
            width={drawerWidth} setWidth={setDrawerWidth}
            selectionText={selection.text}
            fullText={src}
            initialOp={initialOp}
            consumeInitialOp={() => setInitialOp(null)}
            onClose={() => { setAiOpen(false); setInitialOp(null); }}
            onApply={applyAiResult}
            showToast={showToast}
            history={aiHistory} setHistory={setAiHistory}
            onUndo={onAiUndo}
          />
        )}
      </div>

      {floatRect && !aiOpen && (
        <FloatingToolbar
          rect={floatRect}
          onPick={(act) => startOp(act)}
          onClose={closeFloat}
        />
      )}

      <div className="status">
        <div>已自动保存于 {fmtTime(savedAt)}</div>
        <div className="center">{modeLabel} · {words.toLocaleString()} 字 · {tags.length ? tags.map(t => '#'+t).join(' ') : '未添加标签'}</div>
        <div className="right"><kbd>⌘</kbd> + <kbd>S</kbd> 保存 &middot; <kbd>⌘</kbd> + <kbd>↵</kbd> 发布</div>
      </div>

      <PublishModal
        open={showPublish}
        onClose={() => setShowPublish(false)}
        title={title} cat={cat} setCat={setCat} tags={tags}
        summary={summary} setSummary={setSummary}
        onConfirm={() => { setShowPublish(false); showToast('已发布 · 跳转到详情页…'); setTimeout(() => location.href = 'browse.html', 800); }}
      />

      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
