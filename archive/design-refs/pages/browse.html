/* ---------- helpers ---------- */
function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if (idx < 0) return text;
  return <>{text.slice(0, idx)}<mark>{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</>;
}

/* ---------- nav ---------- */
function TopNav({ user }) {
  return (
    <nav className="nav">
      <div className="nav-brand" onClick={() => location.href = 'home.html'}>
        <span style={{ fontSize: 18 }}>📓</span>LabNotes
      </div>
      <div className="nav-tabs">
        <div className="nav-tab" onClick={() => location.href='home.html'}>主页</div>
        <div className="nav-tab active">浏览</div>
        <div className="nav-tab"
             style={user.role === 'guest' ? { opacity: 0.4, cursor: 'not-allowed' } : null}
             onClick={() => user.role !== 'guest' && (location.href='write.html')}>写作</div>
      </div>
      <div className="nav-right">
        {user.role === 'guest' ? (
          <>
            <span className="guest-badge">游客模式</span>
            <a className="btn btn-sm btn-primary" href="login.html" style={{ textDecoration: 'none' }}>登录</a>
          </>
        ) : (
          <div className="avatar-trigger" title={user.name}>{user.initials}</div>
        )}
      </div>
    </nav>
  );
}

/* ---------- left filters ---------- */
function LeftFilters({ cat, setCat, sort, setSort, flags, toggleFlag, onClear }) {
  const items = FILTER_ORDER;
  return (
    <aside className="col-left">
      <div className="widget">
        <h3 className="widget-h">类别</h3>
        {items.map(k => {
          const c = catView(k);
          return (
            <div key={k}
                 className={`filter-item ${cat === k ? 'active cat-' + k : ''}`}
                 onClick={() => setCat(k)}>
              <span className="filter-dot" style={{ background: c.color }}></span>
              <span className="filter-name" style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                {k !== 'all' && <CatIcon cat={k} size={14} />}
                {c.label}
              </span>
              <span className="filter-count">{CAT_COUNTS[k]}</span>
            </div>
          );
        })}
      </div>

      <div className="widget">
        <h3 className="widget-h">排序</h3>
        {[
          ['recent', '最新发布'],
          ['hot',    '最热（按 👍）'],
          ['msg',    '最多评论'],
        ].map(([k, label]) => (
          <div key={k}
               className={`radio-item ${sort === k ? 'active' : ''}`}
               onClick={() => setSort(k)}>
            <span className="radio-mark"></span>{label}
          </div>
        ))}
      </div>

      <div className="widget">
        <h3 className="widget-h">筛选</h3>
        <div className="chip-row">
          {[
            ['saved', '仅看我收藏的'],
            ['liked', '仅看我点赞的'],
            ['code',  '含代码的'],
          ].map(([k, label]) => (
            <span key={k}
                  className={`chip ${flags[k] ? 'active' : ''}`}
                  onClick={() => toggleFlag(k)}>
              {label}
            </span>
          ))}
        </div>
      </div>
    </aside>
  );
}

/* ---------- right widgets ---------- */
function RightSide() {
  const [tlOpen, setTlOpen] = useState(true);
  return (
    <aside className="col-right">
      <div className="widget">
        <h3 className="widget-h">🏷️ 热门标签</h3>
        <div className="chip-row">
          {TAG_CLOUD.map(t => <span key={t} className="chip tag-cloud">{t}</span>)}
        </div>
      </div>

      <div className="widget">
        <h3 className="widget-h">👥 活跃作者</h3>
        {AUTHORS.map(a => (
          <div className="author-row" key={a.name}>
            <span className="avatar">{a.initials}</span>
            <span className="author-name">{a.name}</span>
            <span className="author-meta">{a.count} 篇笔记</span>
          </div>
        ))}
      </div>

      <div className="widget">
        <h3 className="widget-h" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}
            onClick={() => setTlOpen(o => !o)}>
          📅 时间线
          <span style={{ transform: tlOpen ? 'none' : 'rotate(-90deg)', transition: 'transform 150ms ease', display: 'inline-flex' }}>{Icon.chevD}</span>
        </h3>
        {tlOpen && TIMELINE.map(t => (
          <div className="timeline-row" key={t.m}>
            <span>{t.m}</span>
            <span className="tm-count">{t.n}</span>
          </div>
        ))}

/* ---------- card ---------- */
function NoteCard({ n, q, isGuest, onLike, onSave, onGuestBlock }) {
  const c = CATS[n.cat];
  const [bumped, setBumped] = useState({ like: false, save: false });
  const bump = (k) => { setBumped(b => ({ ...b, [k]: true })); setTimeout(() => setBumped(b => ({ ...b, [k]: false })), 220); };

  const onLikeClick = (e) => {
    e.stopPropagation();
    if (isGuest) return onGuestBlock();
    bump('like'); onLike(n.id);
  };
  const onSaveClick = (e) => {
    e.stopPropagation();
    if (isGuest) return onGuestBlock();
    bump('save'); onSave(n.id);
  };
  const onMsgClick = (e) => {
    e.stopPropagation();
    if (isGuest) return onGuestBlock();
  };

  return (
    <article className="note-card card-anim" onClick={() => alert('Open note · ' + n.title)}>
      <div className={`note-cover solid cat-${n.cat}`}>
        <span className="cover-emoji" style={{ display: 'inline-flex', opacity: 0.55 }}>
          <CatIcon cat={n.cat} size={44} stroke={1.5} />
        </span>
        <span className="cover-stripe-label">[ cover ]</span>
      </div>
      <div className="note-body">
        <div className="note-top">
          <span className={`note-cat-pill cat-${n.cat}`}>{c.label}</span>
          <span>{n.minutes} min read</span>
        </div>

        <h3 className="note-title">{highlight(n.title, q)}</h3>
        <p className="note-summary">{highlight(n.summary, q)}</p>

        <div className="note-author">
          <span className="avatar">{n.initials}</span>
          <span style={{ color: 'var(--fg-muted)' }}>{n.author}</span>
          <span className="sep">·</span>
          <span>{n.date}</span>
        </div>

        <div className="note-actions">
          <span className={`note-act ${n.liked ? 'lit-' + n.cat : ''} ${bumped.like ? 'bumped' : ''}`} onClick={onLikeClick}>
            {n.liked ? Icon.thumbFill : Icon.thumb} {n.likes}
          </span>
          <span className="note-act" onClick={onMsgClick}>{Icon.msg} {n.comments}</span>
          <span className={`note-act ${n.saved ? 'lit-' + n.cat : ''} ${bumped.save ? 'bumped' : ''}`} onClick={onSaveClick}>
            {n.saved ? Icon.bookmarkFill : Icon.bookmark} {n.saved ? '已收藏' : '收藏'}
          </span>
        </div>
      </div>
    </article>
  );
}

/* ---------- pagination ---------- */
function Pager({ page, total, onChange }) {
  const pages = [];
  for (let i = 1; i <= total; i++) pages.push(i);
  return (
    <div className="pager">
      <span className={`pg-btn ${page === 1 ? 'disabled' : ''}`} onClick={() => page > 1 && onChange(page - 1)}>{Icon.chevL} 上一页</span>
      {pages.map(p => (
        <span key={p} className={`pg-btn ${page === p ? 'active' : ''}`} onClick={() => onChange(p)}>{p}</span>
      ))}
      <span className={`pg-btn ${page === total ? 'disabled' : ''}`} onClick={() => page < total && onChange(page + 1)}>下一页 {Icon.chevR}</span>
    </div>
  );
}

/* ---------- app ---------- */
function App() {
  const [user] = useState(() => {
    let role = 'member';
    try { role = sessionStorage.getItem('labnotes_role') || 'member'; } catch (_) {}
    return role === 'guest'
      ? { role: 'guest', name: 'Guest', initials: 'G' }
      : { role: 'member', name: 'Zilun', initials: 'ZL' };
  });

  const [cat, setCat]   = useState('all');
  const [sort, setSort] = useState('recent');
  const [flags, setFlags] = useState({ saved: false, liked: false, code: false });
  const [q, setQ] = useState('');
  const [page, setPage] = useState(1);
  const [notes, setNotes] = useState(NOTES);
  const [toast, setToast] = useState('');
  const [animKey, setAnimKey] = useState(0);

  // re-trigger card animation when filters change
  useEffect(() => { setAnimKey(k => k + 1); setPage(1); }, [cat, sort, flags, q]);

  const toggleFlag = (k) => setFlags(f => ({ ...f, [k]: !f[k] }));
  const clearAll = () => { setCat('all'); setSort('recent'); setFlags({ saved:false, liked:false, code:false }); setQ(''); };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1800); };
  const guestBlock = () => showToast('请登录后操作');

  const onLike = (id) => setNotes(ns => ns.map(n => n.id === id ? { ...n, liked: !n.liked, likes: n.likes + (n.liked ? -1 : 1) } : n));
  const onSave = (id) => setNotes(ns => ns.map(n => n.id === id ? { ...n, saved: !n.saved } : n));

  const filtered = useMemo(() => {
    let list = notes.slice();
    if (cat !== 'all') list = list.filter(n => n.cat === cat);
    if (flags.saved)   list = list.filter(n => n.saved);
    if (flags.liked)   list = list.filter(n => n.liked);
    if (flags.code)    list = list.filter(n => n.hasCode);
    if (q) {
      const Q = q.toLowerCase();
      list = list.filter(n => n.title.toLowerCase().includes(Q) || n.summary.toLowerCase().includes(Q));
    }
    if (sort === 'recent') list.sort((a, b) => b.id.localeCompare(a.id));
    if (sort === 'hot')    list.sort((a, b) => b.likes - a.likes);
    if (sort === 'msg')    list.sort((a, b) => b.comments - a.comments);
    return list;
  }, [notes, cat, flags, q, sort]);

  const isGuest = user.role === 'guest';

  return (
    <>
      <TopNav user={user} />

      <div className="shell">
        <LeftFilters
          cat={cat} setCat={setCat}
          sort={sort} setSort={setSort}
          flags={flags} toggleFlag={toggleFlag}
          onClear={clearAll}
        />

        <main className="col-main">
          <div className="search-bar">
            <div className="big-search">
              <span className="s-icon">{Icon.search}</span>
              <input
                placeholder="搜索标题或正文内容…"
                value={q}
                onChange={e => setQ(e.target.value)}
              />
            </div>
            <span className="clear-link" onClick={clearAll}>清除筛选</span>
          </div>

          <div className="grid" key={animKey}>
            {filtered.length === 0
              ? <div className="empty">没有匹配的笔记。试试清除筛选。</div>
              : filtered.map(n => (
                  <NoteCard
                    key={n.id} n={n} q={q}
                    isGuest={isGuest}
                    onLike={onLike} onSave={onSave}
                    onGuestBlock={guestBlock}
                  />
                ))
            }
          </div>

          {filtered.length > 0 && <Pager page={page} total={5} onChange={setPage} />}

          {/* prose-claude container reserved for inline preview */}
          <div className="prose-claude" style={{ display: 'none' }}></div>
        </main>

        <RightSide />
      </div>

      <footer className="footer">
        LabNotes · 实验室内部交流，请勿外传 · Built with ☕ and 🌙
      </footer>

      <div className={`toast ${toast ? 'show' : ''}`}>{toast}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
