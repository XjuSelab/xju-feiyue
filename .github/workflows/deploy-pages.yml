# 部署 GitHub Pages —— 把 site/ 目录(飞跃发展历程页)发布到 GitHub Pages。
# 前置:仓库 Settings → Pages → Source 选 "GitHub Actions"(一次性)。
# 单文件自包含页面,无需构建,直接上传 site/ 作为 Pages 制品。
name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署,新的取消进行中的。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 只在团队库部署 Pages(xjuselab.github.io/xju-feiyue/);部署源库 winbeau/Aurash 不跑,避免红叉。
    if: github.repository == 'XjuSelab/xju-feiyue'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site
      - id: deployment
        uses: actions/deploy-pages@v4
